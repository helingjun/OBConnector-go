name: Bug report
description: Report a reproducible driver issue
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include real passwords, tenant names, private hostnames, tokens, or packet captures.
  - type: input
    id: version
    attributes:
      label: Driver version or commit
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: go1.22.x
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal redacted steps or code.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs
      render: text
